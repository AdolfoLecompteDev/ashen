# ══════════════════════════════════════════
#   Ashen — Kitty
# ══════════════════════════════════════════

shell /bin/zsh

# No startup_session: fastfetch is launched by a zsh hook (~/.zshrc), which does
# run in every new window, not just the first one of the process.

# Remote control: Ashen's theme panel applies colors live
# through this socket (kitten @ --to unix:/tmp/kitty-ashen.sock).
allow_remote_control socket-only
listen_on unix:/tmp/kitty-ashen.sock

# Font
font_family      JetBrainsMono NF
bold_font        JetBrainsMono NF Bold
italic_font      JetBrainsMono NF Italic
bold_italic_font JetBrainsMono NF Bold Italic
font_size        11.0

# Icons: powerline, devicons and the rest of the prompt glyphs.
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF Symbols Nerd Font

# Opaque on purpose: transparency and blur are applied by Hyprland
# (window_rule opacity 0.90 on class kitty).
background_opacity 1.0

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Window
window_padding_width 12
hide_window_decorations yes

# Bell
enable_audio_bell no

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted

# Colors: regenerated by Ashen's theme panel when the scheme changes.
include ashen-colors.conf
